# openapi/components/responses.yaml

PeticionIncorrecta:
  description: Solicitud incorrecta. Datos inválidos o faltantes.
  content:
    application/json:
      schema:
        $ref: "./schemas/Error.yaml"

NoAutorizado:
  description: No autorizado. Token inexistente o expirado.
  content:
    application/json:
      schema:
        $ref: "./schemas/Error.yaml"

Prohibido:
  description: Acceso prohibido. Sin permisos suficientes.
  content:
    application/json:
      schema:
        $ref: "./schemas/Error.yaml"

NoEncontrado:
  description: Recurso no encontrado. El ID no existe.
  content:
    application/json:
      schema:
        $ref: "./schemas/Error.yaml"

ErrorInterno:
  description: Error interno del servidor. Fallo inesperado.
  content:
    application/json:
      schema:
        $ref: "./schemas/Error.yaml"

Creado:
  description: Recurso creado exitosamente.
  content:
    application/json:
      schema:
        type: object
        properties:
          id:
            type: string
            format: uuid
          mensaje:
            type: string
            example: "Operación realizada con éxito."

Conflicto:
  description: Conflicto detectado. Por ejemplo, intentar bloquear un horario que ya tiene citas programadas.
  content:
    application/json:
      schema:
        $ref: './schemas/Error.yaml'