type: object
properties:
  id_transaccion:
    type: string
    format: uuid
  titulo_concepto:
    type: string
    example: "Consulta General"
  fecha_formateada:
    type: string
    example: "15 de Octubre, 2023"
  monto_formateado:
    type: string
    example: "$1,200.00"
  estado_pago:
    type: string
    enum: [ PAGADO, PENDIENTE, RECHAZADO, REEMBOLSADO ]
    example: "PAGADO"
  icono_concepto:
    type: string
    example: "stethoscopy"
