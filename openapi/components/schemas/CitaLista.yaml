allOf:
  - $ref: "./CitaBase.yaml"
  - type: object
    properties:
      fecha_corta:
        type: string
        example: "02 Nov"
      icono_especialidad_id:
        type: string
        example: "tooth-outline"
      estado_texto:
        type: string
        enum: [ Pendiente, Confirmada, Cancelada, Lista ]
      estado_icono:
        type: string
        example: "check-circle"
