type: object
properties:
  dias_disponibles:
    type: array
    description: "Lista de fechas que tienen al menos un horario libre"
    items:
      type: string
      format: date
      example: "2026-05-15"
  horarios_por_dia:
    type: array
    description: "Bloques de tiempo disponibles para la fecha seleccionada"
    items:
      type: object
      properties:
        hora_formateada:
          type: string
          example: "14:30"
        estado:
          type: string
          enum: ["disponible", "ocupado", "bloqueado"]
          example: "disponible"
