post:
  summary: Iniciar sesión en el sistema
  tags:
    - Autenticacion
  security: [] # Ruta pública
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/Login.yaml"
  responses:
    "200":
      description: Login exitoso. Retorna el token y rol.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/AuthRespuesta.yaml"
    "401":
      description: Credenciales incorrectas.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error.yaml"
