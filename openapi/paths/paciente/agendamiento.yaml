especialidades:
  get:
    operationId: obtenerEspecialidades
    summary: "Paso 1: Lista de especialidades"
    tags:
      - paciente_vistas
    responses:
      "200":
        description: Lista de especialidades disponibles.
        content:
          application/json:
            schema:
              type: object
              properties:
                especialidades:
                  type: array
                  items:
                    $ref: "../../components/schemas/Especialidad.yaml"

doctores:
  get:
    operationId: obtenerDoctoresPorEspecialidad
    summary: "Paso 2: Médicos según la especialidad elegida"
    tags:
      - paciente_vistas
    parameters:
      - $ref: "../../components/parameters.yaml#/id_especialidad_query"
    responses:
      "200":
        description: Médicos que pertenecen a esa especialidad.
        content:
          application/json:
            schema:
              type: object
              properties:
                especialistas:
                  type: array
                  items:
                    $ref: "../../components/schemas/Medico.yaml"

sucursales:
  get:
    operationId: obtenerSucursalesPorDoctor
    summary: "Paso 3: Clínicas donde atiende el doctor"
    tags:
      - paciente_vistas
    parameters:
      - $ref: "../../components/parameters.yaml#/id_doctor_query"
    responses:
      "200":
        description: Sucursales disponibles para este médico.
        content:
          application/json:
            schema:
              type: object
              properties:
                sucursales:
                  type: array
                  items:
                    $ref: "../../components/schemas/Sucursal.yaml"

disponibilidad:
  get:
    operationId: obtenerDisponibilidadDoctor
    summary: "Paso 4: Calendario de horarios libres"
    tags:
      - paciente_vistas
    parameters:
      - $ref: "../../components/parameters.yaml#/id_doctor_query"
      - $ref: "../../components/parameters.yaml#/id_sucursal_query"
    responses:
      "200":
        description: Días y horas disponibles.
        content:
          application/json:
            schema:
              $ref: "../../components/schemas/Disponibilidad.yaml"

resumen:
  get:
    operationId: obtenerResumenReserva
    summary: "Paso 5: Resumen final para confirmación"
    tags:
      - paciente_vistas
    parameters:
      - $ref: "../../components/parameters.yaml#/id_doctor_query"
      - $ref: "../../components/parameters.yaml#/id_sucursal_query"
      - $ref: "../../components/parameters.yaml#/fecha_query"
      - $ref: "../../components/parameters.yaml#/hora_query"
    responses:
      "200":
        description: Resumen completo de la cita antes de confirmar.
        content:
          application/json:
            schema:
              $ref: "../../components/schemas/ResumenAgendamiento.yaml"
