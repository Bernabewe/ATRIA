post:
  operationId: crearCita
  summary: "Paso 5: Confirmar agendamiento"
  tags:
    - paciente_acciones
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/CrearCitaBody.yaml"
  responses:
    "201":
      description: Cita creada y pago procesado.
      content:
        application/json:
          schema:
            type: object
            properties:
              id_cita:
                type: string
                format: uuid
              estado_pago:
                type: string
                example: "APROBADO"
    "400":
      $ref: "../../../components/responses.yaml#/PeticionIncorrecta"
    "401":
      $ref: "../../../components/responses.yaml#/NoAutorizado"
