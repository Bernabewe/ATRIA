put:
  operationId: actualizarPerfilPaciente
  summary: Actualizar la información del perfil del paciente
  tags:
    - paciente_acciones
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            peso:
              type: number
              example: 72.5
            altura:
              type: number
              example: 1.75
            telefono:
              type: string
              example: "+34 600 000 000"
            direccion_completa:
              type: string
              example: "Calle Principal 123, Madrid"
  responses:
    "200":
      description: Perfil actualizado correctamente.
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/MensajeExito.yaml"
    "400":
      $ref: "../../../components/responses.yaml#/PeticionIncorrecta"
    "401":
      $ref: "../../../components/responses.yaml#/NoAutorizado"
