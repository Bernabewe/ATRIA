patch:
  operationId: cancelarCita
  summary: Cancelar una cita programada
  tags:
    - paciente_acciones
  parameters:
    - $ref: "../../../components/parameters.yaml#/id_cita_path"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            motivo_cancelacion:
              type: string
              example: "Problemas de transporte"
  responses:
    "200":
      description: Cita cancelada correctamente.
      content:
        application/json:
          schema:
            type: object
            properties:
              nuevo_estado:
                type: string
                example: "CANCELADA"
              reembolso_aplicado:
                type: boolean
                example: false
    "400":
      $ref: "../../../components/responses.yaml#/PeticionIncorrecta"
    "401":
      $ref: "../../../components/responses.yaml#/NoAutorizado"
