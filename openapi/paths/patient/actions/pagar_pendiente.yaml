post:
  operationId: payPendingTransaction
  summary: Pagar el saldo de una transacción pendiente
  tags:
    - Portal Paciente — Acciones
  parameters:
    - $ref: "../../../components/parameters.yaml#/id_transaccion_path"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            metodo_pago_id:
              type: string
              example: "card_9876"
  responses:
    "200":
      description: Pago completado.
      content:
        application/json:
          schema:
            type: object
            properties:
              nuevo_estado:
                type: string
                example: "PAGADO"
    "400":
      $ref: "../../../components/responses.yaml#/BadRequest"
    "401":
      $ref: "../../../components/responses.yaml#/Unauthorized"
