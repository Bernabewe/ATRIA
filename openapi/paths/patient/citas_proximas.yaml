get:
  operationId: getPatientUpcomingAppointments
  summary: Listado de citas próximas y recientes
  tags:
    - Portal Paciente — Vistas
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              proxima_prioridad:
                $ref: "../../components/schemas/CitaBase.yaml"
              visitas_proximas:
                type: array
                items:
                  $ref: "../../components/schemas/CitaLista.yaml"
              completadas_recientemente:
                type: array
                items:
                  $ref: "../../components/schemas/CitaLista.yaml"
    "401":
      $ref: "../../components/responses.yaml#/Unauthorized"
