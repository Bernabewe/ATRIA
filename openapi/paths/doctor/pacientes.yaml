get:
  operationId: obtenerPacientes
  summary: "Obtiene el listado de pacientes del doctor"
  tags:
    - doctor_vistas
  parameters:
    - $ref: "../../components/parameters.yaml#/busqueda_query"
    - $ref: "../../components/parameters.yaml#/page_query"
    - $ref: "../../components/parameters.yaml#/limit_query"
  responses:
    "200":
      description: "Lista de pacientes obtenida con éxito"
      content:
        application/json:
          schema:
            type: object
            properties:
              pacientes:
                type: array
                items:
                  $ref: "../../components/schemas/PacienteResumen.yaml"
              meta:
                type: object
                properties:
                  total_resultados:
                    type: integer
                    example: 10
    "401":
      $ref: "../../components/responses.yaml#/NoAutorizado"
    "500":
      $ref: "../../components/responses.yaml#/ErrorInterno"
