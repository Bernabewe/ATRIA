get:
  operationId: getDoctorPayments
  summary: Ver ingresos y transacciones recientes del médico
  tags:
    - Portal Doctor — Vistas
  responses:
    '200':
      description: Historial financiero cargado.
      content:
        application/json:
          schema:
            type: object
            properties:
              ingresos_del_mes_formateado:
                type: string
                example: "$45,800.00"
              transacciones_recientes:
                type: array
                items:
                  $ref: '../../components/schemas/Transaccion.yaml'
    '401':
      $ref: '../../components/responses.yaml#/Unauthorized'