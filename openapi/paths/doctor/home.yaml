get:
  operationId: obtenerInicioDoctor
  summary: "Obtiene los datos para la pantalla de inicio del doctor"
  tags:
    - doctor_vistas
  responses:
    "200":
      description: "Datos de inicio del doctor"
      content:
        application/json:
          schema:
            type: object
            properties:
              doctor_nombre_pila:
                type: string
                example: "Arriaga"
              proxima_cita:
                $ref: "../../components/schemas/ProximaCitaDoctor.yaml"
                nullable: true
              acciones_rapidas:
                type: array
                items:
                  $ref: "../../components/schemas/AccionRapida.yaml"
