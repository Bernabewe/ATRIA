put:
  summary: Actualizar información de contacto del perfil
  tags:
    - doctor_acciones
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            telefono:
              type: string
              example: "+52 55 4321 9876"
            correo_electronico:
              type: string
              format: email
              example: "dr.wilson@terracotta.med"
            foto_perfil_base64:
              type: string
              description: "Opcional: Nueva foto en Base64"
  responses:
    "200":
      description: Perfil actualizado correctamente.
      content:
        application/json:
          schema:
            type: object
            properties:
              mensaje:
                type: string
                example: "Perfil actualizado con éxito."
    "400":
      $ref: "../../../components/responses.yaml#/PeticionIncorrecta"
    "401":
      $ref: "../../../components/responses.yaml#/NoAutorizado"
