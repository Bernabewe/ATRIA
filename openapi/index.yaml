openapi: 3.0.3
info:
  title: Atria API - Sistema de Gestión Médica
  description:
    Documentación oficial de las APIs bajo el patrón BFF para los portales
    de paciente y doctor de Atria.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Servidor de desarrollo local

security:
  - bearerAuth: []

tags:
  - name: paciente_vistas
    description: Endpoints de lectura para el portal del paciente.
  - name: paciente_acciones
    description: Endpoints de escritura y mutaciones del paciente.
  - name: doctor_vistas
    description: Endpoints de lectura para el portal del doctor.
  - name: doctor_acciones
    description: Endpoints de escritura y mutaciones del doctor.

# ------------------------------------------------------------------
# RUTAS (PATHS) - Mapeo de endpoints a archivos específicos
# ------------------------------------------------------------------
paths:
  # --- Autenticación ---
  /v1/auth/login:
    $ref: "./paths/auth/login.yaml"
  /v1/auth/signup:
    $ref: "./paths/auth/signup.yaml"

  # --- Módulo de Perfil e Inicio ---
  /v1/views/paciente/home:
    $ref: "./paths/paciente/home.yaml"
  /v1/views/paciente/perfil_paciente:
    $ref: "./paths/paciente/perfil_paciente.yaml"

  # --- Módulo de Citas ---
  /v1/views/paciente/citas_proximas:
    $ref: "./paths/paciente/citas_proximas.yaml"
  /v1/views/paciente/citas_pasadas:
    $ref: "./paths/paciente/citas_pasadas.yaml"
  /v1/views/paciente/gestionar_cita:
    $ref: "./paths/paciente/gestionar_cita.yaml"

  # --- Módulo de Reserva Médica (Agendamiento) ---
  /v1/views/paciente/reservas/especialidades:
    $ref: "./paths/paciente/agendamiento.yaml#/especialidades"
  /v1/views/paciente/reservas/sucursales:
    $ref: "./paths/paciente/agendamiento.yaml#/sucursales"
  /v1/views/paciente/reservas/doctores:
    $ref: "./paths/paciente/agendamiento.yaml#/doctores"
  /v1/views/paciente/reservas/disponibilidad:
    $ref: "./paths/paciente/agendamiento.yaml#/disponibilidad"
  /v1/views/paciente/reservas/resumen:
    $ref: "./paths/paciente/agendamiento.yaml#/resumen"

  # --- Módulo de Historiales ---
  /v1/views/paciente/historial_medico:
    $ref: "./paths/paciente/historial_medico.yaml"
  /v1/views/paciente/historial_pagos:
    $ref: "./paths/paciente/historial_pagos.yaml"

  # --- Módulo de Acciones (Mutaciones) ---
  /v1/paciente/actualizar_perfil:
    $ref: "./paths/paciente/actions/actualizar_perfil.yaml"
  /v1/paciente/reservas/reservar_cita:
    $ref: "./paths/paciente/actions/reservar_cita.yaml"
  /v1/paciente/pagos/{id_transaccion}/pagar_pendiente:
    $ref: "./paths/paciente/actions/pagar_pendiente.yaml"
  /v1/paciente/citas/{id_cita}/cancelar:
    $ref: "./paths/paciente/actions/cancelar_cita.yaml"

  # --- Perfil e Inicio ---
  /v1/views/doctor/home:
    $ref: "./paths/doctor/home.yaml"
  /v1/views/doctor/perfil_doctor:
    $ref: "./paths/doctor/perfil_doctor.yaml"

  # --- Agenda y Citas ---
  /v1/views/doctor/agenda_proximas:
    $ref: "./paths/doctor/agenda_proximas.yaml"

  # --- Mis Pacientes ---
  /v1/views/doctor/pacientes:
    $ref: "./paths/doctor/pacientes.yaml"
  /v1/views/doctor/pacientes/{id_paciente}/historial_paciente:
    $ref: "./paths/doctor/historial_paciente.yaml"
  /v1/views/doctor/nuevo_expediente:
    $ref: "./paths/doctor/nuevo_expediente.yaml"

  # --- Finanzas ---
  /v1/views/doctor/pagos:
    $ref: "./paths/doctor/pagos.yaml"

  # --- Acciones (Mutaciones) del Doctor ---
  /v1/doctor/guardar_expediente:
    $ref: "./paths/doctor/actions/guardar_expediente.yaml"

  /v1/doctor/bloquear_agenda:
    $ref: "./paths/doctor/actions/bloquear_agenda.yaml"

  /v1/doctor/exportar_pagos:
    $ref: "./paths/doctor/actions/exportar_pagos.yaml"

  /v1/doctor/editar_perfil:
    $ref: "./paths/doctor/actions/editar_perfil.yaml"

# ------------------------------------------------------------------
# COMPONENTES - Biblioteca global de piezas reutilizables
# ------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdCitaPath:
      $ref: "./components/parameters.yaml#/id_cita_path"
    IdTransaccionPath:
      $ref: "./components/parameters.yaml#/id_transaccion_path"
    IdPacientePath:
      $ref: "./components/parameters.yaml#/id_paciente_path"
    IdCitaQuery:
      $ref: "./components/parameters.yaml#/id_cita_query"
    IdEspecialidadQuery:
      $ref: "./components/parameters.yaml#/id_especialidad_query"
    IdSucursalQuery:
      $ref: "./components/parameters.yaml#/id_sucursal_query"
    IdDoctorQuery:
      $ref: "./components/parameters.yaml#/id_doctor_query"
    IdPacienteQuery:
      $ref: "./components/parameters.yaml#/id_paciente_query"
    MesQuery:
      $ref: "./components/parameters.yaml#/mes_query"
    FechaQuery:
      $ref: "./components/parameters.yaml#/fecha_query"
    HoraQuery:
      $ref: "./components/parameters.yaml#/hora_query"

  responses:
    PeticionIncorrecta:
      $ref: "./components/responses.yaml#/PeticionIncorrecta"
    NoAutorizado:
      $ref: "./components/responses.yaml#/NoAutorizado"
    Prohibido:
      $ref: "./components/responses.yaml#/Prohibido"
    NoEncontrado:
      $ref: "./components/responses.yaml#/NoEncontrado"
    Conflicto:
      $ref: "./components/responses.yaml#/Conflicto"
    ErrorInterno:
      $ref: "./components/responses.yaml#/ErrorInterno"
    Creado:
      $ref: "./components/responses.yaml#/Creado"

  # Registro de todos los moldes de datos (Schemas)
  schemas:
    Paciente:
      $ref: "./components/schemas/Paciente.yaml"
    CitaBase:
      $ref: "./components/schemas/CitaBase.yaml"
    CitaLista:
      $ref: "./components/schemas/CitaLista.yaml"
    CitaDetalle:
      $ref: "./components/schemas/CitaDetalle.yaml"
    Especialidad:
      $ref: "./components/schemas/Especialidad.yaml"
    Sucursal:
      $ref: "./components/schemas/Sucursal.yaml"
    Medico:
      $ref: "./components/schemas/Medico.yaml"
    AccionRapida:
      $ref: "./components/schemas/AccionRapida.yaml"
    Transaccion:
      $ref: "./components/schemas/Transaccion.yaml"
    ConsultaHistorial:
      $ref: "./components/schemas/ConsultaHistorial.yaml"
    ResumenAgendamiento:
      $ref: "./components/schemas/ResumenAgendamiento.yaml"
    MensajeExito:
      $ref: "./components/schemas/MensajeExito.yaml"
    CitaDoctor:
      $ref: "./components/schemas/CitaDoctor.yaml"
    PerfilDoctor:
      $ref: "./components/schemas/PerfilDoctor.yaml"
    ExpedienteClinico:
      $ref: "./components/schemas/ExpedienteClinico.yaml"
    BloqueoAgenda:
      $ref: "./components/schemas/BloqueoAgenda.yaml"
    Error:
      $ref: "./components/schemas/Error.yaml"
    Login:
      $ref: "./components/schemas/Login.yaml"
    AuthRespuesta:
      $ref: "./components/schemas/AuthRespuesta.yaml"
