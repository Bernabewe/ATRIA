openapi: 3.0.3
info:
  title: Atria API - Sistema de Gestión Médica
  description: Documentación oficial de las APIs bajo el patrón BFF para los portales
    de paciente y doctor de Atria.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Servidor de desarrollo local

security:
  - bearerAuth: []

tags:
  - name: Portal Paciente — Vistas
    description: Endpoints de lectura para el portal del paciente.
  - name: Portal Paciente — Acciones
    description: Endpoints de escritura y mutaciones del paciente.
  - name: Portal Doctor — Vistas
    description: Endpoints de lectura para el portal del doctor.
  - name: Portal Doctor — Acciones
    description: Endpoints de escritura y mutaciones del doctor.

# ------------------------------------------------------------------
# RUTAS (PATHS) - Mapeo de endpoints a archivos específicos
# ------------------------------------------------------------------
paths:
  # --- Módulo de Perfil e Inicio ---
  /v1/views/patient/home:
    $ref: "./paths/patient/home.yaml"
  /v1/views/patient/profile_details:
    $ref: "./paths/patient/perfil_paciente.yaml"

  # --- Módulo de Citas ---
  /v1/views/patient/citas_proximas:
    $ref: "./paths/patient/citas_proximas.yaml"
  /v1/views/patient/citas_pasadas:
    $ref: "./paths/patient/citas_pasadas.yaml"
  /v1/views/patient/gestionar_cita:
    $ref: "./paths/patient/gestionar_cita.yaml"

  # --- Módulo de Reserva Médica (Agendamiento) ---
  /v1/views/patient/reservas/especialidad:
    $ref: "./paths/patient/agendamiento.yaml#/~1especialidades"
  /v1/views/patient/reservas/sucursal:
    $ref: "./paths/patient/agendamiento.yaml#/~1sucursales"
  /v1/views/patient/reservas/doctores:
    $ref: "./paths/patient/agendamiento.yaml#/~1doctores"
  /v1/views/patient/reservas/disponibilidad:
    $ref: "./paths/patient/agendamiento.yaml#/~1disponibilidad"
  /v1/views/patient/reservas/resumen:
    $ref: "./paths/patient/agendamiento.yaml#/~1resumen"

  # --- Módulo de Historiales ---
  /v1/views/patient/historial_medico:
    $ref: "./paths/patient/historial_medico.yaml"
  /v1/views/patient/historial_pagos:
    $ref: "./paths/patient/historial_pagos.yaml"

  # --- Módulo de Acciones (Mutaciones) ---
  /v1/patient/profile:
    $ref: "./paths/patient/actions/actualizar_perfil.yaml"
  /v1/reservas/appointments:
    $ref: "./paths/patient/actions/reservar_cita.yaml"
  /v1/patient/historial_pagos/{id_transaccion}/pay:
    $ref: "./paths/patient/actions/pagar_pendiente.yaml"
  /v1/appointments/{id_cita}/cancel:
    $ref: "./paths/patient/actions/cancelar_cita.yaml"

  
  # --- Perfil e Inicio ---
  /v1/views/doctor/home:
    $ref: './paths/doctor/home.yaml'
  /v1/views/doctor/profile_details:
    $ref: './paths/doctor/perfil_doctor.yaml'

  # --- Agenda y Citas ---
  /v1/views/doctor/agenda_proximas:
    $ref: './paths/doctor/agenda_proximas.yaml'

  # --- Mis Pacientes ---
  /v1/views/doctor/patients:
    $ref: './paths/doctor/pacientes.yaml'
  /v1/views/doctor/patients/{id_paciente}/history:
    $ref: './paths/doctor/historial_paciente.yaml'
  /v1/views/doctor/consultations/new:
    $ref: './paths/doctor/nuevo_expediente.yaml'

  # --- Finanzas ---
  /v1/views/doctor/payments:
    $ref: './paths/doctor/pagos.yaml'

  # --- Acciones (Mutaciones) del Doctor ---
  /v1/doctor/consultations:
    $ref: './paths/doctor/actions/guardar_expediente.yaml'
    
  /v1/doctor/schedule/blocks:
    $ref: './paths/doctor/actions/bloquear_agenda.yaml'
    
  /v1/doctor/payments/export:
    $ref: './paths/doctor/actions/exportar_pagos.yaml'
    
  /v1/doctor/profile:
    $ref: './paths/doctor/actions/editar_perfil.yaml'

# ------------------------------------------------------------------
# COMPONENTES - Biblioteca global de piezas reutilizables
# ------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdCitaPath:
      $ref: "./components/parameters.yaml#/id_cita_path"
    IdTransaccionPath:
      $ref: "./components/parameters.yaml#/id_transaccion_path"
    IdPacientePath:
      $ref: "./components/parameters.yaml#/id_paciente_path"
    IdCitaQuery:
      $ref: "./components/parameters.yaml#/id_cita_query"
    IdEspecialidadQuery:
      $ref: "./components/parameters.yaml#/id_especialidad_query"
    IdSucursalQuery:
      $ref: "./components/parameters.yaml#/id_sucursal_query"
    IdDoctorQuery:
      $ref: "./components/parameters.yaml#/id_doctor_query"
    IdPacienteQuery:
      $ref: "./components/parameters.yaml#/id_paciente_query"
    MesQuery:
      $ref: "./components/parameters.yaml#/mes_query"
    FechaQuery:
      $ref: "./components/parameters.yaml#/fecha_query"
    HoraQuery:
      $ref: "./components/parameters.yaml#/hora_query"

  responses:
    BadRequest:
      $ref: "./components/responses.yaml#/BadRequest"
    Unauthorized:
      $ref: "./components/responses.yaml#/Unauthorized"
    Forbidden:
      $ref: "./components/responses.yaml#/Forbidden"
    NotFound:
      $ref: "./components/responses.yaml#/NotFound"
    Conflict:
      $ref: "./components/responses.yaml#/Conflict"
    InternalServerError:
      $ref: "./components/responses.yaml#/InternalServerError"
    Created:
      $ref: "./components/responses.yaml#/Created"

  # Registro de todos los moldes de datos (Schemas)
  schemas:
    Paciente:
      $ref: "./components/schemas/Paciente.yaml"
    CitaBase:
      $ref: "./components/schemas/CitaBase.yaml"
    CitaLista:
      $ref: "./components/schemas/CitaLista.yaml"
    CitaDetalle:
      $ref: "./components/schemas/CitaDetalle.yaml"
    Especialidad:
      $ref: "./components/schemas/Especialidad.yaml"
    Sucursal:
      $ref: "./components/schemas/Sucursal.yaml"
    Medico:
      $ref: "./components/schemas/Medico.yaml"
    AccionRapida:
      $ref: "./components/schemas/AccionRapida.yaml"
    Transaccion:
      $ref: "./components/schemas/Transaccion.yaml"
    ConsultaHistorial:
      $ref: "./components/schemas/ConsultaHistorial.yaml"
    ResumenAgendamiento:
      $ref: "./components/schemas/ResumenAgendamiento.yaml"
    MensajeExito:
      $ref: "./components/schemas/MensajeExito.yaml"
    CitaDoctor:
      $ref: "./components/schemas/CitaDoctor.yaml"
    PerfilDoctor:
      $ref: "./components/schemas/PerfilDoctor.yaml"
    ExpedienteClinico:
      $ref: "./components/schemas/ExpedienteClinico.yaml"
    BloqueoAgenda:
      $ref: "./components/schemas/BloqueoAgenda.yaml"
    Error:
      $ref: "./components/schemas/Error.yaml"
